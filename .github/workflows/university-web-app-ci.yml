name: University Web App CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

env:
  PROJECT_DIR: .
  CI_SCRIPT: .github/scripts/ci/main.py
  JAVA_VERSION: '21'
  PYTHON_VERSION: '3.12'
  DOCKER_IMAGE_NAME: university-web-app
  JAR_ARTIFACT_NAME: university-web-app-jar

jobs:
  run-tests:
    name: Run tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: maven
          cache-dependency-path: ${{ env.PROJECT_DIR }}/pom.xml

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Run Maven tests
        run: python "${CI_SCRIPT}" test

  build-jar:
    name: Build Spring Boot JAR
    runs-on: ubuntu-latest
    needs: run-tests

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: maven
          cache-dependency-path: ${{ env.PROJECT_DIR }}/pom.xml

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Build JAR
        run: python "${CI_SCRIPT}" build-jar

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.JAR_ARTIFACT_NAME }}
          path: ${{ env.PROJECT_DIR }}/target/*.jar
          if-no-files-found: error
          retention-days: 7

  build-docker-image:
    name: Build Docker image
    runs-on: ubuntu-latest
    needs: build-jar

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Download JAR artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ env.JAR_ARTIFACT_NAME }}
          path: ${{ env.PROJECT_DIR }}/target

      - name: Build Docker image
        run: python "${CI_SCRIPT}" build-docker-image