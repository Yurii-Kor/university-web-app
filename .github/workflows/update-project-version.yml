name: Update Project Version

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'New Maven project version, for example 0.1.0'
        required: true
        type: string

permissions:
  contents: write

env:
  PROJECT_DIR: .
  CI_SCRIPT: .github/scripts/ci/main.py
  JAVA_VERSION: '21'
  PYTHON_VERSION: '3.12'

jobs:
  update-version:
    name: Update Maven project version
    runs-on: ubuntu-latest

    if: github.ref_name == 'dev'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: maven
          cache-dependency-path: pom.xml

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Update project version
        run: python "${CI_SCRIPT}" update-version --version "${{ inputs.version }}"