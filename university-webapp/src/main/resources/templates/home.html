<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8" />
  <title>Home</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 720px; margin: 48px auto; }
    code { background: #f4f4f4; padding: 2px 6px; border-radius: 4px; }
    a { margin-right: 12px; }
  </style>
</head>
<body>
  <h2>Welcome 👋</h2>
  <p>
    You are logged in as <code th:text="${email}">user@example.com</code><br/>
    Roles/Authorities: <code th:text="${authorities}">[ROLE_STUDENT]</code>
  </p>

  <p>
    <a th:href="@{/profile}">Profile</a>
    <form th:action="@{/logout}" method="post" style="display:inline">
    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
    <button type="submit"
            style="background:none;border:0;padding:0;margin-left:12px;color:#0d6efd;cursor:pointer;text-decoration:underline;font:inherit">
      Logout
    </button>
  </form>
  </p>
</body>
</html>
