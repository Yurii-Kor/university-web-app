<!doctype html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<body>

<header class="ou-header" th:fragment="ouHeader(activeTab)">
  <div class="ou-header__logo">
    <img th:src="@{/images/ou-logo.png}" alt="Open University logo">
  </div>

  <div class="ou-header__text ou-header__text--with-actions">
    <div class="ou-header__brand" aria-label="Open University">
      <span class="ou-brand-ou">O</span><span class="ou-brand-rest">pen</span>
      <span class="ou-brand-ou">U</span><span class="ou-brand-rest">niversity</span>
    </div>

    <nav class="ou-tabs" aria-label="Primary navigation">

      <a class="ou-tab"
         th:href="@{/profile}"
         th:classappend="${activeTab} == 'profile' ? ' ou-tab--active' : ''">
        Profile
      </a>

      <a class="ou-tab"
         th:href="@{/courses}"
         th:classappend="${activeTab} == 'courses' ? ' ou-tab--active' : ''">
        Courses
      </a>

      <a class="ou-tab"
         th:href="@{/groups}"
         th:classappend="${activeTab} == 'groups' ? ' ou-tab--active' : ''">
        Groups
      </a>

      <a class="ou-tab"
         th:href="@{/students}"
         th:classappend="${activeTab} == 'students' ? ' ou-tab--active' : ''">
        Students
      </a>

      <a class="ou-tab"
         th:href="@{/teachers}"
         th:classappend="${activeTab} == 'teachers' ? ' ou-tab--active' : ''">
        Teachers
      </a>

      <a class="ou-tab"
         sec:authorize="hasAnyRole('TEACHER','STUDENT')"
         th:href="@{/schedule}"
         th:classappend="${activeTab} == 'schedule' ? ' ou-tab--active' : ''">
        Schedule
      </a>

      <a class="ou-tab"
         sec:authorize="hasRole('ADMIN')"
         th:href="@{/admin}"
         th:classappend="${activeTab} == 'admin' ? ' ou-tab--active' : ''">
        Admins
      </a>
      
      <a class="ou-tab"
         sec:authorize="hasRole('ADMIN')"
         th:href="@{/accounts}"
         th:classappend="${activeTab} == 'accounts' ? ' ou-tab--active' : ''">
        Accounts
      </a>

    </nav>

    <div class="ou-header__actions" aria-label="Header actions">
      <div class="ou-userchip" sec:authorize="isAuthenticated()">
      	<div class="ou-userchip__label">Signed ID:</div>
      	
      	<div class="ou-userchip__value" sec:authentication="name">user</div>
      	
      	<div class="ou-userchip__meta">
      	  <span sec:authentication="principal.authorities">ROLE</span>
    	</div>
      	
      </div>
      
      <form class="ou-inline-form" th:action="@{/logout}" method="post">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
        <button type="submit" class="ou-btn ou-btn--ghost">Log out</button>
      </form>
    </div>
  </div>
</header>

</body>
</html>
