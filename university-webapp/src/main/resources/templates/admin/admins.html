<!doctype html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
  <meta charset="utf-8" />
  <title>Admins</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="icon" th:href="@{/favicon.ico}" href="/favicon.ico" />
  <link rel="stylesheet" th:href="@{/css/app.css}" href="/css/app.css" />
  <link rel="stylesheet" th:href="@{/css/pages/admins.css}" href="/css/pages/admins.css" />
</head>

<body class="ou-page admins-page">
  <div th:replace="~{fragments/header :: ouHeader('admin')}"></div>

  <main class="admins-main">
    <section class="ou-card" aria-label="Admins management">

      <div class="admins-toolbar">
        <div>
          <h1 class="ou-card__title">Admins</h1>
          <p class="admins-subtitle">List of all admin accounts in the system.</p>
        </div>

        <a class="ou-btn ou-btn--ghost" th:href="@{/admin/create}">
          + Create admin
        </a>
      </div>
      
      <div class="ou-alert ou-alert--success" th:if="${created == true}">
        Admin account has been created.
      </div>
      
      <div class="ou-alert ou-alert--success" th:if="${ok != null}" th:text="${ok}">
		Done.
	  </div>
      
      <div class="ou-alert ou-alert--error" th:if="${err != null}" th:text="${err}">
		Something went wrong.
	  </div>

      <div class="ou-alert ou-alert--warn" th:if="${#lists.isEmpty(admins)}">
        No admins found.
      </div>

      <div class="admins-grid" th:if="${!#lists.isEmpty(admins)}">
        <article class="ou-card admin-card"
                 th:each="a : ${admins}"
                 th:attr="data-id=${a.id}">

          <div class="admin-card__head">
            <div class="admin-card__who">
              <div class="admin-card__email">
                <span th:text="${a.email}">admin@mail.com</span>
                <span class="admin-card__you" th:if="${a.id == selfId}">(you)</span>
              </div>

              <div class="admin-card__name">
                <span th:text="${a.firstName}">First</span>
                <span th:text="${a.lastName}">Last</span>
              </div>
            </div>

            <span class="ou-badge"
                  th:classappend="${a.enabled} ? ' ou-badge--success' : ' ou-badge--warn'"
                  th:text="${a.enabled} ? 'ACTIVE' : 'BLOCKED'">
              ACTIVE
            </span>
          </div>

          <dl class="admin-kv">
            <dt>ID</dt>
            <dd th:text="${a.id}">1</dd>

            <dt>Created</dt>
            <dd th:text="${#temporals.format(a.createdAt, 'yyyy-MM-dd HH:mm')}">
              2025-01-01 12:00
            </dd>
          </dl>

          <div class="admin-actions" th:if="${a.id != selfId}">

            <form class="ou-inline-form"
                  th:action="${a.enabled}
                           ? @{/admin/{id}/disable(id=${a.id})}
                           : @{/admin/{id}/enable(id=${a.id})}"
                  method="post">
              <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
              <button type="submit"
                      class="ou-btn ou-btn--ghost"
                      th:text="${a.enabled} ? 'Disable' : 'Enable'">
                Disable
              </button>
            </form>

            <form class="ou-inline-form"
                  th:action="@{/admin/{id}/delete(id=${a.id})}"
                  method="post">
              <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
              <button type="submit"
                      class="ou-btn ou-btn--danger"
                      onclick="return confirm('Delete this admin?');">
                Delete
              </button>
            </form>

          </div>

        </article>
      </div>

    </section>
  </main>
</body>
</html>
