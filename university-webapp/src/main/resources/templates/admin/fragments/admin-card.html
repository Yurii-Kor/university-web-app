<!doctype html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org">
<body>

<th:block th:fragment="adminCard(a, selfId, currentPage)">
  <article class="ou-card admin-card"
           th:attr="data-id=${a.id}">

    <div class="admin-card__head">
      <div class="admin-card__who">
        <div class="admin-card__email">
          <span th:text="${a.email}">admin@mail.com</span>
          <span class="admin-card__you" th:if="${a.id == selfId}">(you)</span>
        </div>

        <div class="admin-card__name">
          <span th:text="${a.firstName}">First</span>
          <span th:text="${a.lastName}">Last</span>
        </div>
      </div>

      <span class="ou-badge"
            th:classappend="${a.enabled} ? ' ou-badge--success' : ' ou-badge--warn'"
            th:text="${a.enabled} ? 'ACTIVE' : 'BLOCKED'">
        ACTIVE
      </span>
    </div>

    <dl class="admin-kv">
      <dt>ID</dt>
      <dd th:text="${a.id}">1</dd>

      <dt>Created</dt>
      <dd th:text="${#temporals.format(a.createdAt, 'yyyy-MM-dd HH:mm')}">
        2025-01-01 12:00
      </dd>
    </dl>

    <div class="admin-actions" th:if="${a.id != selfId}">

      <form class="ou-inline-form"
            th:action="${a.enabled}
                     ? @{/admin/{id}/disable(id=${a.id})}
                     : @{/admin/{id}/enable(id=${a.id})}"
            method="post">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
        <input type="hidden" name="page" th:value="${currentPage}" />
        <button type="submit"
                class="ou-btn ou-btn--ghost"
                th:text="${a.enabled} ? 'Disable' : 'Enable'">
          Disable
        </button>
      </form>

      <form class="ou-inline-form"
            th:action="@{/admin/{id}/delete(id=${a.id})}"
            method="post">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
        <input type="hidden" name="page" th:value="${currentPage}" />
        <button type="submit"
                class="ou-btn ou-btn--danger"
                onclick="return confirm('Delete this admin?');">
          Delete
        </button>
      </form>

    </div>

  </article>
</th:block>

</body>
</html>
