<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="utf-8" />
<title>Login</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link
	href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
	rel="stylesheet"
	integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
	crossorigin="anonymous">
<link rel="icon" th:href="@{/favicon.ico}" href="/favicon.ico" />
<link rel="stylesheet" th:href="@{/css/app.css}" href="/css/app.css" />
</head>

<body class="login-page">

	<!-- Хедер — без изменений -->
	<header class="ou-header">
		<div class="ou-header__logo">
			<img th:src="@{/images/ou-logo.png}" src="/images/ou-logo.png"
				alt="Open University logo">
		</div>
		<div class="ou-header__text">
			<div class="ou-header__brand" aria-label="Open University">
				<span class="ou-brand-ou">O</span><span class="ou-brand-rest">pen
				</span> <span class="ou-brand-ou">U</span><span class="ou-brand-rest">niversity</span>
			</div>
			<div class="ou-header__page" aria-label="Current page">Log In</div>
		</div>
	</header>

	<main class="login-main">
		<div class="login-grid">
			<section class="login-card" role="region"
				aria-labelledby="login-title">
				<h1 id="login-title" class="login-card__title">Sign in</h1>

				<form class="login-form" th:action="@{/login}" method="post"
					novalidate>
					
					<input type="hidden" th:name="${_csrf.parameterName}"
						th:value="${_csrf.token}" />
						
					<div class="login-field">
						<label for="username" class="login-label">Email</label> <input
							id="username" name="username" type="email" class="ou-input"
							placeholder="teacherN@mail.com" autocomplete="username" required>
					</div>

					<div class="login-field">
						<label for="password" class="login-label">Password</label>
						<div class="password-wrap">
							<input id="password" name="password" type="password"
								class="ou-input ou-input--password" placeholder="Tch-N!dev"
								autocomplete="current-password" required>
							<button type="button" id="togglePassword" class="show-btn"
								aria-label="Show password" aria-pressed="false"
								title="Show password">👁</button>
						</div>
					</div>

					<div class="login-actions">
						<button type="submit" class="ou-btn">Log in</button>
					</div>
				</form>
			</section>

			<aside class="tips-card" role="complementary"
				aria-labelledby="tips-title">
				<h2 id="tips-title" class="tips-title">Test accounts</h2>

				<div class="tips-section">
					<div class="tips-subtitle">Active</div>
					<ul class="tips-list">
						<li>Teacher: <code>teacher2@mail.com</code> / <code>Tch-2!dev</code></li>
						<li>Student: <code>student2@mail.com</code> / <code>Std-2!dev</code></li>
					</ul>
				</div>

				<div class="tips-section">
					<div class="tips-subtitle">Blocked (for testing)</div>
					<ul class="tips-list">
						<li>Teacher: <code>teacher1@mail.com</code> / <code>Tch-1!dev</code></li>
						<li>Student: <code>student1@mail.com</code> / <code>Std-1!dev</code></li>
					</ul>
				</div>
			</aside>
		</div>
	</main>

	<script>
  (function () {
    const input = document.getElementById('password');
    const btn = document.getElementById('togglePassword');
    if (!input || !btn) return;

    btn.addEventListener('click', () => {
      const show = input.type === 'password';
      input.type = show ? 'text' : 'password';
      btn.setAttribute('aria-pressed', String(show));
      btn.title = show ? 'Hide password' : 'Show password';
      btn.textContent = show ? '🙈' : '👁';

      input.focus({ preventScroll: true });
      const len = input.value.length;
      try { input.setSelectionRange(len, len); } catch(e) {}
    });
  })();
  </script>

</body>

</html>
