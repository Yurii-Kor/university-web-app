<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
	<meta charset="utf-8" />
	<title>Profile • Teacher</title>
	<meta name="viewport" content="width=device-width, initial-scale=1" />
	<link rel="icon" th:href="@{/favicon.ico}" href="/favicon.ico" />
	<link rel="stylesheet" th:href="@{/css/app.css}" href="/css/app.css" />
	<link rel="stylesheet" th:href="@{/css/pages/profile.css}"
		href="/css/pages/profile.css" />
</head>

<body class="profile-page">
<header class="ou-header">
	<div class="ou-header__logo">
    	<img th:src="@{/images/ou-logo.png}" src="/images/ou-logo.png" alt="Open University logo">
  	</div>
  	
  	<div class="ou-header__text ou-header__text--with-actions">
    	<div class="ou-header__brand" aria-label="Open University">
      		<span class="ou-brand-ou">O</span><span class="ou-brand-rest">pen</span>
      		<span class="ou-brand-ou">U</span><span class="ou-brand-rest">niversity</span>
    	</div>

    	<div class="ou-header__page" aria-label="Current page">Profile</div>

    	<div class="ou-header__actions" aria-label="Header actions">
      		<form class="ou-inline-form" th:action="@{/logout}" method="post">
        		<input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
        		<button type="submit" class="ou-btn ou-btn--ghost">Log out</button>
      		</form>
    	</div>
  	</div>
</header>

<main class="profile-main" th:with="updated=${param.updated != null},
               						denied=${param.denied != null}">
               
 	<div class="profile-wrap">
    	<section class="ou-card profile-grid" aria-labelledby="profile-title">
    		<div class="profile-card-inner">
      			<h1 id="profile-title" class="ou-card__title">Teacher profile</h1>

      			<dl class="kv" aria-label="Account details">
        			<dt class="kv-key">Email</dt>
        			<dd class="kv-val" th:text="${profile.email}">teacher@example.com</dd>

        			<dt class="kv-key">First name</dt>
        			<dd class="kv-val" th:text="${profile.firstName}">Alice</dd>

        			<dt class="kv-key">Last name</dt>
	        		<dd class="kv-val" th:text="${profile.lastName}">Smith</dd>

        			<dt class="kv-key">Created at</dt>
        			<dd class="kv-val" th:text="${profile.createdAt}">2025-01-01T12:00Z</dd>

        			<dt class="kv-key">Academic rank</dt>
        			<dd class="kv-val" th:text="${profile.academicRank}">PROFESSOR</dd>

        			<dt class="kv-key">Office</dt>
        			<dd class="kv-val" th:text="${profile.office}">B-101</dd>
      			</dl>

      			<p class="profile-note">
        			Role: <strong>TEACHER</strong>
      			</p>
      			
      			<div th:if="${err}" class="ou-alert ou-alert--error" th:text="${err}">
      				Something went wrong.
    			</div>
    			
    			<div class="ou-alert ou-alert--warn" th:if="${denied}">
    				Access denied.
  				</div>

  				<div class="ou-alert ou-alert--success" th:if="${updated}">
    				Profile updated.
  				</div>
    			
    			<details class="profile-edit" th:attr="open=${(updated or denied or err != null) ? 'open' : null}">
    				<summary class="ou-btn ou-btn--ghost">Edit profile</summary>
    				
    				<div class="profile-edit__body">
    					<form th:action="@{/profile/self/update}" method="post" class="form-grid">
    						<input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
    						
    						<div class="form-row">
            					<label for="email">Email</label>
            					<input id="email" name="email" class="ou-input"
                   					   type="email" placeholder="Enter new email"
                   					   th:value="${profile.email}" />
          					</div>
          					
          					<div class="form-row">
            					<label for="firstName">First name</label>
            					<input id="firstName" name="firstName" class="ou-input"
                  					   type="text" placeholder="Enter first name"
                   					   th:value="${profile.firstName}" />
          					</div>
          					
          					<div class="form-row">
            					<label for="lastName">Last name</label>
            					<input id="lastName" name="lastName" class="ou-input"
                   					   type="text" placeholder="Enter last name"
                   					   th:value="${profile.lastName}" />
          					</div>
          					
          					<div class="form-actions">
            					<button type="reset" class="ou-btn ou-btn--secondary">Cancel</button>
            					<button type="submit" class="ou-btn">Save</button>
          					</div>
    					</form>
    				</div>
    			</details>
      		</div>
    	</section>
  	</div>
</main>

</body>
</html>
