<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
	<meta charset="utf-8" />
	<title>Profile • Admin</title>
	<meta name="viewport" content="width=device-width, initial-scale=1" />
	<link rel="icon" th:href="@{/favicon.ico}" href="/favicon.ico" />
	<link rel="stylesheet" th:href="@{/css/app.css}" href="/css/app.css" />
	<link rel="stylesheet" th:href="@{/css/pages/profile.css}"
		href="/css/pages/profile.css" />
</head>

<body class="profile-page">
<div th:replace="~{fragments/profile-header :: ouHeader('Profile (Admin)')}"></div>
	
<main class="profile-main"
      th:with="denied=${param.denied != null},
               hasError=${err != null},
               hasUpdated=${updated == true}">
               						
	<div class="profile-wrap">
		<section class="ou-card" aria-labelledby="profile-title">
			<div class="profile-card-inner">
				<h1 id="profile-title" class="ou-card__title">Account details</h1>
					
				<dl class="kv">
					<dt class="kv-key">Email</dt>
	        		<dd class="kv-val" th:text="${profile.email}">admin@example.com</dd>
	        			
	        		<dt class="kv-key">First name</dt>
	        		<dd class="kv-val" th:text="${profile.firstName}">Alice</dd>
	        			
	        		<dt class="kv-key">Last name</dt>
	        		<dd class="kv-val" th:text="${profile.lastName}">Admin</dd>
	        			
	        		<dt class="kv-key">Created at</dt>
	        		<dd class="kv-val" th:text="${profile.createdAt}">2025-01-01T12:00Z</dd>
				</dl>
					
				<p class="profile-note">
	        		Role: <strong>ADMIN</strong>
	      		</p>
	      		
	      		<div th:replace="~{fragments/profile-edit :: selfEdit(
                	${profile},
                	${denied},
                	${hasError},
                	${hasUpdated},
                	${err} )}">
                </div>
      		</div>
		</section>
	</div>
</main>

</body>
</html>
