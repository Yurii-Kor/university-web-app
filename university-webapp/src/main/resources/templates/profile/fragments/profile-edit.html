<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<body>

<div th:fragment="selfEdit(profile, hasError, hasUpdated, err)" class="profile-edit-block">

  <div class="ou-alert ou-alert--success profile-edit-block__msg"
       th:if="${hasUpdated}">
    Profile updated.
  </div>

  <details class="profile-edit"
           th:attr="open=${hasError ? 'open' : null}">

    <summary class="ou-btn ou-btn--ghost">Edit profile</summary>

    <div class="profile-edit__body">

      <div class="ou-alert ou-alert--error profile-edit__msg"
           th:if="${hasError}"
           th:text="${err}">
        Something went wrong.
      </div>

      <form th:action="@{/profile/self/update}" method="post" class="form-grid">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

        <div class="form-row">
          <label for="email">Email</label>
          <input id="email" name="email" class="ou-input"
                 type="email" placeholder="Enter new email"
                 th:value="${profile.email}" />
        </div>

        <div class="form-row">
          <label for="firstName">First name</label>
          <input id="firstName" name="firstName" class="ou-input"
                 type="text" placeholder="Enter first name"
                 th:value="${profile.firstName}" />
        </div>

        <div class="form-row">
          <label for="lastName">Last name</label>
          <input id="lastName" name="lastName" class="ou-input"
                 type="text" placeholder="Enter last name"
                 th:value="${profile.lastName}" />
        </div>

        <div class="form-actions">
          <button type="reset" class="ou-btn ou-btn--secondary">Cancel</button>
          <button type="submit" class="ou-btn">Save</button>
        </div>
      </form>
    </div>
  </details>

</div>

</body>
</html>
